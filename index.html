<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketala's Housewarming Invitation</title>
    
    <meta property="og:title" content="You are Cordially Invited! ✨" />
    <meta property="og:description" content="Tap the envelope to open our digital invitation." />
    <meta property="og:image" content="https://sohanketala.github.io/Initation/envelope.png" />
    <meta property="og:url" content="https://sohanketala.github.io/Initation/" />
    <meta property="og:type" content="website" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f7f4eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Allows scrolling on smaller mobile screens so the tall card isn't cut off */
            overflow-y: auto; 
            font-family: Arial, sans-serif;
            padding: 20px 0;
        }

        /* Responsive container that handles the centering cleanly */
        .invitation-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Base styling for envelope and card */
        .envelope, .card {
            width: 100%;
            height: auto;
            transition: all 0.8s ease-in-out;
        }

        .envelope {
            position: absolute;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 4px;
        }

        .card {
            position: absolute;
            /* Prevents the ultra-tall card from blowing past mobile screen heights */
            max-height: 85vh; 
            object-fit: contain;
            z-index: 1;
            opacity: 0;
            transform: scale(0.8);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* ANIMATION STATES TRIGGERED BY JAVASCRIPT */
        
        /* Smoothly scale down and fade out the envelope completely */
        .invitation-container.open .envelope {
            transform: scale(0.5);
            opacity: 0;
            pointer-events: none;
        }

        /* Bring the card to full scale, center it perfectly, and make it scrollable if required */
        .invitation-container.open .card {
            position: relative; 
            opacity: 1;
            transform: scale(1);
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="invitation-container" id="inviteBox">
        <img src="envelope.png" alt="Envelope" class="envelope">
        
        <img src="card.jpeg" alt="Invitation Card" class="card">
    </div>

    <script>
        const inviteBox = document.getElementById('inviteBox');
        inviteBox.addEventListener('click', () => {
            inviteBox.classList.toggle('open');
        });
    </script>
</body>
</html>
