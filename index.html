<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ketala's Housewarming Invitation</title>

    <!-- WhatsApp / Open Graph Preview Tags -->
    <meta property="og:title" content="Ketala's Housewarming Invitation 🏠" />
    <meta property="og:description" content="Tap to open the interactive invitation card ✨" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sohanketala.github.io/Initation/" />
    <meta property="og:image" content="https://sohanketala.github.io/Initation/envelope.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card (some apps use this as fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://sohanketala.github.io/Initation/envelope.png" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f7f4eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; 
            font-family: Arial, sans-serif;
            padding: 20px 0;
        }

        /* Container acts as a strict mask to hide the card initially */
        .invitation-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 280px; /* Locked to the exact height framework of your envelope */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Envelope is perfectly fixed in front */
        .envelope {
            position: absolute;
            width: 100%;
            height: auto;
            z-index: 5; /* Stays above the unclicked card */
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 6px;
        }

        /* Card is perfectly hidden directly under the envelope frame */
        .card {
            position: absolute;
            width: 96%;
            max-height: 85vh; 
            object-fit: contain;
            z-index: 1; /* Hidden behind envelope */
            opacity: 0;
            transform: scale(0.9) translateY(0);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        /* ==========================================
           CINEMATIC DRAWER SLIDE-OUT ANIMATION
           ========================================== */

        /* When opened, the envelope cleanly fades and slides downward out of focus */
        .invitation-container.open .envelope {
            transform: translateY(200px) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        /* The card gracefully scales up, rises to the front, and fills center stage */
        .invitation-container.open .card {
            position: relative; /* Breaks out of absolute layer to expand the webpage frame */
            opacity: 1;
            z-index: 10; /* Jumps way ahead of the fading envelope */
            animation: slideOutAndReveal 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideOutAndReveal {
            0% {
                transform: scale(0.9) translateY(0);
                opacity: 0;
            }
            40% {
                /* Shoots smoothly upwards out of the envelope track */
                transform: scale(0.95) translateY(-120px);
                opacity: 0.8;
            }
            100% {
                /* Comes completely forward into center focus */
                transform: scale(1.05) translateY(-40px);
                opacity: 1;
            }
        }

        /* Subtle premium breathing/floating effect after opening */
        .invitation-container.open .card {
            animation: slideOutAndReveal 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                       gentleFloat 4s ease-in-out infinite alternate 1.2s;
        }

        @keyframes gentleFloat {
            0% { transform: scale(1.05) translateY(-40px); }
            100% { transform: scale(1.05) translateY(-45px); }
        }
    </style>
</head>
<body>

    <div class="invitation-container" id="inviteBox">
        <img src="envelope.png" alt="Envelope" class="envelope">
        
        <img src="card.jpeg" alt="Invitation Card" class="card">
    </div>

    <script>
        const inviteBox = document.getElementById('inviteBox');
        inviteBox.addEventListener('click', () => {
            inviteBox.classList.toggle('open');
        });
    </script>
</body>
</html>
