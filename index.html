<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketala's Housewarming Invitation</title>
    
    <!-- WhatsApp Preview Meta Tags -->
    <meta property="og:title" content="You are Cordially Invited! ✨" />
    <meta property="og:description" content="Tap the envelope to open our digital invitation." />
    <meta property="og:image" content="https://sohanketala.github.io/Initation/envelope.png" />
    <meta property="og:url" content="https://sohanketala.github.io/Initation/" />
    <meta property="og:type" content="website" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f7f4eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; 
            font-family: Arial, sans-serif;
            padding: 40px 0;
        }

        /* Perspective context wrapper for smooth 3D animations */
        .invitation-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 280px; /* Aligns container layout around the envelope height */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            perspective: 1200px;
        }

        /* Envelope stays upfront initially */
        .envelope {
            position: absolute;
            width: 100%;
            height: auto;
            z-index: 2;
            transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-radius: 4px;
            transform-origin: bottom center;
        }

        /* Card is hidden tucked slightly lower 'inside' the boundary envelope frame */
        .card {
            position: absolute;
            width: 95%;
            max-height: 85vh; 
            object-fit: contain;
            z-index: 1;
            opacity: 0;
            /* Starts lower down inside the envelope area scaled slightly small */
            transform: translateY(20px) scale(0.9);
            /* Complex cubic-bezier timing controls the "pulling out" slide tempo */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, z-index 0s linear 0.4s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        /* ANIMATION SEQUENCE WHEN CLICKED */
        
        /* 1. The envelope drops away forward slightly as the card pulls out */
        .invitation-container.open .envelope {
            transform: translateY(180px) rotateX(-15deg) scale(0.85);
            opacity: 0;
            pointer-events: none;
        }

        /* 2. The card dramatically shoots upwards, pops to front z-index, and settles into view */
        .invitation-container.open .card {
            position: relative;
            opacity: 1;
            z-index: 3;
            /* Negative translate handles the fluid upward extraction motion out of the envelope */
            transform: translateY(0) scale(1.05);
        }
    </style>
</head>
<body>

    <div class="invitation-container" id="inviteBox">
        <!-- Envelope Image -->
        <img src="envelope.png" alt="Envelope" class="envelope">
        
        <!-- Invitation Card Image -->
        <img src="card.jpeg" alt="Invitation Card" class="card">
    </div>

    <script>
        const inviteBox = document.getElementById('inviteBox');
        inviteBox.addEventListener('click', () => {
            inviteBox.classList.toggle('open');
        });
    </script>
</body>
</html>
